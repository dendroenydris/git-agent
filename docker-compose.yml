services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: git_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/git_rag
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      LOG_LEVEL: INFO
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - repo_cache:/app/backend/.data/repositories
      - vectorstores:/app/backend/.data/vectorstores

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m celery -A backend.main.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/git_rag
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      LOG_LEVEL: INFO
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - postgres
      - redis
    volumes:
      - repo_cache:/app/backend/.data/repositories
      - vectorstores:/app/backend/.data/vectorstores

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  repo_cache:
  vectorstores:
